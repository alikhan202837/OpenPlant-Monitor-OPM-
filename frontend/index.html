<!DOCTYPE html>
<html>
<head>
  <title>OpenPlant Monitor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      margin: 0;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      width: 200px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card h2 {
      margin-bottom: 10px;
      color: #34495e;
    }

    .value {
      font-size: 24px;
      font-weight: bold;
      color: #27ae60;
    }
  </style>
</head>

<body>

<h1>🌱 OpenPlant Monitor Dashboard</h1>

<div class="container">

  <div class="card">
    <h2>🌡 Temperature</h2>
    <div class="value">25 °C</div>
  </div>

  <div class="card">
    <h2>⚙ Pressure</h2>
    <div class="value">1.2 bar</div>
  </div>

  <div class="card">
    <h2>✅ Status</h2>
    <div class="value">Running</div>
  </div>

</div>

</body>
</html>
