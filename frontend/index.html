<!DOCTYPE html>
<html>
<head>
  <title>OpenPlant Monitor</title>
  <style>
    body {
      font-family: Arial;
      background-color: #f4f6f8;
      text-align: center;
    }
    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      color: #2c3e50;
    }
  </style>
</head>
<body>

<h1>🌱 OpenPlant Monitor</h1>

<div class="card">
  <h2>🌡 Temperature</h2>
  <p>25 °C</p>
</div>

<div class="card">
  <h2>⚙ Pressure</h2>
  <p>1.2 bar</p>
</div>

<div class="card">
  <h2>✅ Status</h2>
  <p>Running</p>
</div>

</body>
</html>
